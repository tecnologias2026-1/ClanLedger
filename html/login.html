<!doctype html>

<!-- ARCHIVO: login.html -->
<!-- DESCRIPCION: Estructura y secciones de la vista. -->
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClanLedger</title>
    <link rel="icon" type="image/png" href="../assets/imagenes/favicon.png" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/accessibility.css" />
    <link rel="stylesheet" href="../css/button-hover.css" />
    <script defer src="../js/page-transition.js"></script>
    <script defer src="../js/accessibility.js"></script>
  </head>

  <body>
    <header class="header">
      <div class="logo">
        <img src="../assets/imagenes/Logo.png" class="logo-img" alt="" />
      </div>
      <p class="subtitle">Tu ecosistema financiero todo en uno</p>
    </header>

    <main class="container">
      <div class="form-box login-box">
        <h2>Iniciar Sesión</h2>

        <form
          id="loginForm"
          novalidate
          style="
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
          "
        >
          <label class="visually-hidden" for="login-email"
            >Correo electronico</label
          >
          <input
            id="login-email"
            type="email"
            placeholder="Correo electrónico"
            required
          />

          <label class="visually-hidden" for="login-password">Contrasena</label>
          <input
            id="login-password"
            type="password"
            placeholder="Contraseña"
            required
          />

          <button type="submit" class="register">Iniciar Sesión</button>

          <p
            class="link"
            style="
              margin: 10px 0;
              font-size: 13px;
              color: #666;
              cursor: pointer;
            "
          >
            Olvidé mi contraseña
          </p>

          <a
            href="registro.html"
            class="register"
            role="button"
            style="
              text-decoration: none;
              background: #d0d0d0;
              color: #333;
              width: auto;
              padding: 8px 20px;
              display: inline-block;
              text-align: center;
            "
          >
            Crear cuenta
          </a>
        </form>
      </div>
    </main>

    <footer class="footer">
      <hr class="footer-line" />
      <img src="../assets/imagenes/Logo.png" class="footer-logo" />
      <p class="footer-subtitle">Tu ecosistema financiero todo en uno</p>
      <p class="footer-year">2026 The ClanLedger Team</p>

      <script src="../js/auth.js"></script>
    </footer>
  </body>
</html>
