<html>
<head>
    <meta charset="UTF-8">
    <meta name = "viewport" content = "width=device-width">
    <link rel="stylesheet" href="../css/stylestransacciones.css" >
    <title>ClanLedger</title>
</head>

<body>
    <div class="header">
        <div class="headleft">
            <h2>Transacciones</h2>
            <h3>Gestiona tus ingresos y gastos</h3>
        </div>
        <div class="headright">
            <span class="bgheadright">
                <img src="../assets/imagenes/person_1.png" alt="modo personal" class="modopers">
                <img src="../assets/imagenes/family_group_2.png" alt="modo familiar" class="modofam">
            </span>
            
        </div>
    </div>

    <span class="nuevatransaccion">
        <a href="#">Nueva Transacción</a>
    </span>

    <div class="busqueda">
        <div class="titulos">
            <h4>Buscar</h4>
            <h4>Tipo</h4>
            <h4>Categoría</h4>
            <h4>Miembro</h4>
        </div>
        <div class="cuadros">
            <span class="cuadro1">
                <h6>Búsqueda</h6>
            </span>
            <span class="cuadro2">
                <h6>Elige la opción</h6>
            </span>
             <span class="cuadro3">
                <h6>Todas</h6>
            </span>
             <span class="cuadro2">
                <h6>Todos</h6>
            </span>
        </div>
    </div>

    <div class="cards">
        <span class="card">
            <div class="cardleft">
                <div class="leftsup">
                    <h4>Salario</h4>
                    <img src = "../assets/imagenes/delete.png" alt = "Icono de eliminar">
                </div>
                <div class="leftinf">
                    <p>21/02/26</p>
                    <p>Salario</p>
                    <p>Fernando</p>
                    <p>Efectivo</p>
                </div>
            </div>
            <div class="cardright">
                <h3>+$4.000.000</h3>
            </div>
        </span>
    </div>

     <footer>
        <div class="footer" id="foot">

            <hr class="divisor">

            <div class="textofoot" id = "fimg">
                <img src = "../assets/imagenes/Logo.png" alt = "logo">
            </div>

            <div class="textosvert" id = "ftxt">
                <h4>Tu ecosistema financiero todo en uno.</h4>
                <h4>© 2026. The ClanLedger Team</h4>
            </div>

        </div>
    </footer>


</body>

</html>
