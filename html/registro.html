<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClanLedger</title>
    <link rel="icon" type="image/png" href="../assets/imagenes/favicon.png" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/button-hover.css" />
    <script defer src="../js/page-transition.js"></script>
  </head>

  <body>
    <header class="header">
      <div class="logo">
        <img
          src="../assets/imagenes/Logo.png"
          alt="ClanLedger Logo"
          class="logo-img"
        />
      </div>
      <p class="subtitle">Tu ecosistema financiero todo en uno</p>
    </header>

    <main class="container">
      <div class="form-box">
        <h2>Crear una cuenta</h2>

        <form id="registroForm">
          <div class="row">
            <input type="text" placeholder="Nombre" />
            <input type="text" placeholder="Apellido" />
          </div>

          <div class="label-container">
            <label>Fecha de nacimiento</label>
            <div class="row">
              <input type="number" placeholder="Día" />
              <input type="number" placeholder="Mes" />
              <input type="number" placeholder="Año" />
            </div>
          </div>

          <div class="label-container">
            <label>Género</label>
            <div class="gender">
              <input type="radio" name="genero" id="masc" />
              <label for="masc">Masculino</label>

              <input type="radio" name="genero" id="fem" />
              <label for="fem">Femenino</label>

              <input type="radio" name="genero" id="otro" />
              <label for="otro">Otro</label>
            </div>
          </div>

          <div class="row">
            <input type="email" placeholder="Correo electrónico" />
            <input type="password" placeholder="Contraseña" />
          </div>

          <button type="submit" class="register">Crear Cuenta</button>
        </form>
      </div>
    </main>

    <footer class="footer">
      <hr class="footer-line" />
      <img src="../assets/imagenes/Logo.png" class="footer-logo" />
      <p class="footer-subtitle">Tu ecosistema financiero todo en uno</p>
      <p class="footer-year">2026 The ClanLedger Team</p>
    </footer>

    <script src="../js/auth.js"></script>
  </body>
</html>
