<!doctype html>

<!-- ARCHIVO: registro.html -->
<!-- DESCRIPCION: Estructura y secciones de la vista. -->
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClanLedger</title>
    <link rel="icon" type="image/png" href="../assets/imagenes/favicon.png" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/accessibility.css" />
    <link rel="stylesheet" href="../css/button-hover.css" />
    <script defer src="../js/page-transition.js"></script>
    <script defer src="../js/accessibility.js"></script>
  </head>

  <body class="page-registro">
    <header class="header">
      <div class="logo">
        <img
          src="../assets/imagenes/Logo.png"
          alt="ClanLedger Logo"
          class="logo-img"
        />
      </div>
      <p class="subtitle">Tu ecosistema financiero todo en uno</p>
    </header>

    <main class="container">
      <div class="form-box">
        <h2>Crear una cuenta</h2>

        <form id="registroForm" novalidate>
          <div class="row">
            <label class="visually-hidden" for="reg-nombre">Nombre</label>
            <input id="reg-nombre" type="text" placeholder="Nombre" />

            <label class="visually-hidden" for="reg-apellido">Apellido</label>
            <input id="reg-apellido" type="text" placeholder="Apellido" />
          </div>

          <div class="label-container">
            <label id="reg-fecha-label">Fecha de nacimiento</label>
            <div class="row">
              <label class="visually-hidden" for="reg-dia">Dia</label>
              <input
                id="reg-dia"
                type="number"
                placeholder="Día"
                aria-labelledby="reg-fecha-label"
              />

              <label class="visually-hidden" for="reg-mes">Mes</label>
              <input
                id="reg-mes"
                type="number"
                placeholder="Mes"
                aria-labelledby="reg-fecha-label"
              />

              <label class="visually-hidden" for="reg-anio">Año</label>
              <input
                id="reg-anio"
                type="number"
                placeholder="Año"
                aria-labelledby="reg-fecha-label"
              />
            </div>
          </div>

          <div class="label-container">
            <label>Género</label>
            <div class="gender">
              <input type="radio" name="genero" id="masc" />
              <label for="masc">Masculino</label>

              <input type="radio" name="genero" id="fem" />
              <label for="fem">Femenino</label>

              <input type="radio" name="genero" id="otro" />
              <label for="otro">Otro</label>
            </div>
          </div>

          <div class="row">
            <label class="visually-hidden" for="reg-email"
              >Correo electrónico</label
            >
            <input
              id="reg-email"
              type="email"
              placeholder="Correo electrónico"
            />

            <label class="visually-hidden" for="reg-password">Contraseña</label>
            <input id="reg-password" type="password" placeholder="Contraseña" />
          </div>

          <button type="submit" class="register">Crear Cuenta</button>
        </form>
      </div>
    </main>

    <footer class="footer">
      <hr class="footer-line" />
      <img src="../assets/imagenes/Logo.png" class="footer-logo" />
      <p class="footer-subtitle">Tu ecosistema financiero todo en uno</p>
      <p class="footer-year">2026 The ClanLedger Team</p>
    </footer>

    <script src="../js/auth.js"></script>
  </body>
</html>
